version: "3.9"

services:
  rfo-engine:
    build: .
    image: rfo-core:latest
    ports:
      - "3000:3000"
      - "9000:9000"
    environment:
      RFO_SECRET_KEY: "${RFO_SECRET_KEY:?Set RFO_SECRET_KEY in .env}"
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL in .env}"
      RFO_BIND_ADDR: "0.0.0.0:3000"
      RUST_LOG: "${RUST_LOG:-info}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rfo
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: rfo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
